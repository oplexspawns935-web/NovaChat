<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetFlux Optimizer</title>
    <style>
      body {
        margin: 0;
        background: transparent;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      .card {
        width: 520px;
        height: 320px;
        border-radius: 22px;
        background: radial-gradient(900px circle at 20% -20%, rgba(76,201,240,0.30), transparent 60%),
          radial-gradient(700px circle at 90% 10%, rgba(181,23,255,0.28), transparent 55%),
          radial-gradient(700px circle at 40% 120%, rgba(255,77,222,0.18), transparent 60%),
          rgba(7, 10, 19, 0.92);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.10), 0 24px 90px rgba(0,0,0,0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
      }
      .title {
        font-size: 20px;
        letter-spacing: 0.5px;
        color: rgba(255,255,255,0.92);
      }
      .sub {
        font-size: 13px;
        color: rgba(255,255,255,0.62);
      }
      .bar {
        width: 280px;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255,255,255,0.10);
        position: relative;
      }
      .bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -40%;
        width: 45%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(76,201,240,0.9), rgba(181,23,255,0.9), transparent);
        animation: move 1.1s infinite;
      }
      @keyframes move {
        0% { left: -50%; }
        100% { left: 110%; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">NetFlux Optimizer</div>
      <div class="sub">Initializing optimization engine…</div>
      <div class="bar"></div>
    </div>
  </body>
</html>
